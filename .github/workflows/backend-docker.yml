name: Backend Docker Build & Push

on:
    push:
        branches:
            - main
        paths:
            - "backend/**"
            - ".github/workflows/backend-docker.yml"
    pull_request:
        paths:
            - "backend/**"
            - ".github/workflows/backend-docker.yml"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: dong-chen-1031/cpp-here/backend

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            - name: Build and push image by digest
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  platforms: ${{ matrix.platform }}
                  push: ${{ github.event_name != 'pull_request' }}
                  outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.platform }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

            - name: Export digest
              if: github.event_name != 'pull_request'
              run: |
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - name: Upload digest artifact
              if: github.event_name != 'pull_request'
              uses: actions/upload-artifact@v4
              with:
                  name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request'
        needs: build
        permissions:
            contents: read
            packages: write

        steps:
            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digest-*
                  merge-multiple: true

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=sha-

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Create and push multi-platform manifest
              working-directory: /tmp/digests
              run: |
                  docker buildx imagetools create \
                    $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                    $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

            - name: Inspect final manifest
              run: |
                  docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
